<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Freedom Chair - Vectary Configurator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
        }
        
        #wrapper {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }
        
        #ui {
            width: 300px;
            background: white;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }
        
        #ui h1 {
            font-size: 24px;
            margin-bottom: 30px;
            color: #333;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }
        
        #ui section {
            margin-bottom: 30px;
        }
        
        #ui h2 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #555;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        #ui select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        
        #ui select:hover {
            border-color: #007bff;
        }
        
        #ui select:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
        }
        
        #vectary-configurator-wrapper {
            flex: 1;
            background: #868686;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #vectary-container {
            flex: 1;
            background: #868686;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .info {
            background: #e7f3ff;
            border-left: 4px solid #007bff;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 13px;
            color: #004085;
        }
        
        .info strong {
            display: block;
            margin-bottom: 5px;
        }

        .vectary-error {
            background: #fdecea;
            border-left: 4px solid #f44336;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 4px;
            font-size: 12px;
            color: #b71c1c;
        }

        .vectary-success {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 4px;
            font-size: 12px;
            color: #2e7d32;
        }

        select:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }
    </style>
</head>
<body>

                Select options below to customize your chair. Changes will be reflected in the 3D model on the right.
            </div>
            
            <!-- Options will be dynamically generated here -->
            <div id="vectary-options-container" class="design-product-ajax-content">
                <div class="loading">Loading configuration...</div>
            </div>
        </section>
        
        <div id="vectary-configurator-wrapper" class="vectary-configurator-wrapper" data-vectary-type="configurator">
            <iframe
                id="vectary-configurator-embed"
                src="https://www.vectary.com/p/2NzQyzfG51LGV6loLhynt5"
                frameborder="0"
                allow="fullscreen"
                allowfullscreen
                loading="lazy">
            </iframe>
        </div>
    </div>

        // Global configuration object used by vectary-simple.js
        window.vectaryConfig = {
            iframeId: "vectary-configurator-embed",
            materialsCsvUrl: "./vectary/Vectary_Materials.csv",
            variantsCsvUrl: "./vectary/Vectary_Products_Variants.csv",
            mapping: window.freedomChairMapping,
            isConfigurator: true,
            debug: true // Set to true to enable console debugging
        };

        // Create UI elements dynamically
        (function createUIElements() {
            var container = document.getElementById('vectary-options-container');
            if (!container) return;

            container.innerHTML = '';

            var mapping = window.freedomChairMapping;
            var applications = mapping.applications || {};
            Object.keys(applications).forEach(function(applicationTitle) {
                var applicationName = applications[applicationTitle];
                var section = document.createElement('div');
                section.className = 'field option';
                section.setAttribute('data-option_id', applicationName);

                var label = document.createElement('label');
                label.textContent = applicationTitle;
                label.className = 'label';
                section.appendChild(label);

                var selectWrapper = document.createElement('div');
                selectWrapper.className = 'control';

                var select = document.createElement('select');
                select.id = 'select_' + applicationName;
                select.name = 'options[' + applicationName + ']';
                select.className = 'required-entry product-custom-option';
                select.setAttribute('data-application', applicationName);

                var defaultOption = document.createElement('option');
                defaultOption.value = '';
                defaultOption.textContent = 'Choose an option...';
                select.appendChild(defaultOption);

                if (mapping.materials && mapping.materials[applicationName]) {
                    var materials = mapping.materials[applicationName];
                    Object.keys(materials).forEach(function(optionLabel) {
                        var option = document.createElement('option');
                        option.value = optionLabel;
                        option.textContent = optionLabel;
                        if (applicationName === 'base') {
                            console.log(option);
                        }
                        select.appendChild(option);
                    });
                }

                selectWrapper.appendChild(select);
                section.appendChild(selectWrapper);
                container.appendChild(section);
            });
            
            // Add conditional logic for base options based on lift selection
            // setupLiftBaseConditionalLogic();
        })();
        
        // Function to handle conditional base options based on lift selection
        function setupLiftBaseConditionalLogic() {
            var liftSelect = document.getElementById('select_lift');
            var baseSelect = document.getElementById('select_base');
            
            if (!liftSelect || !baseSelect) {
                console.warn('Lift or Base select elements not found');
                return;
            }
            
            // Store all base options for later restoration
            var allBaseOptions = [];
            for (var i = 0; i < baseSelect.options.length; i++) {
                allBaseOptions.push({
                    value: baseSelect.options[i].value,
                    text: baseSelect.options[i].text
                });
            }
            
            // Function to filter base options based on lift selection
            function filterBaseOptions() {
                var liftValue = liftSelect.value;
                
                // Clear current selection if the selected option will be hidden
                var currentBaseValue = baseSelect.value;
                var shouldClearSelection = false;
                
                // Remove all options except the default "Choose an option..."
                while (baseSelect.options.length > 1) {
                    baseSelect.remove(1);
                }
                
                // Add options based on lift selection
                if (liftValue === 'Standard') {
                    // Show all base options for Standard
                    for (var i = 1; i < allBaseOptions.length; i++) {
                        var option = document.createElement('option');
                        option.value = allBaseOptions[i].value;
                        option.textContent = allBaseOptions[i].text;
                        baseSelect.appendChild(option);
                    }
                } else if (liftValue === 'Tall' || liftValue === 'High') {
                    // Show only "Wheels (Hard Floors)" for Tall and High
                    for (var i = 1; i < allBaseOptions.length; i++) {
                        if (allBaseOptions[i].value === 'Wheels (Hard Floors)') {
                            var option = document.createElement('option');
                            option.value = allBaseOptions[i].value;
                            option.textContent = allBaseOptions[i].text;
                            baseSelect.appendChild(option);
                            break;
                        }
                    }
                    
                    // Clear selection if current value is not "Wheels (Hard Floors)"
                    if (currentBaseValue && currentBaseValue !== 'Wheels (Hard Floors)') {
                        baseSelect.value = '';
                        shouldClearSelection = true;
                    }
                } else {
                    // No lift selected, show all options
                    for (var i = 1; i < allBaseOptions.length; i++) {
                        var option = document.createElement('option');
                        option.value = allBaseOptions[i].value;
                        option.textContent = allBaseOptions[i].text;
                        baseSelect.appendChild(option);
                    }
                }
                
                // If selection was cleared, trigger change event to update UI
                if (shouldClearSelection) {
                    var changeEvent = new Event('change', { bubbles: true });
                    baseSelect.dispatchEvent(changeEvent);
                }
            }
            
            // Apply filter on lift selection change
            liftSelect.addEventListener('change', function() {
                filterBaseOptions();
            });
            
            // Apply initial filter if lift already has a value
            if (liftSelect.value) {
                filterBaseOptions();
            }
        }
